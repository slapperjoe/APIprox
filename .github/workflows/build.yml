name: Build Tauri App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install root dependencies
        run: npm install

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm install

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          # Optional: sign update bundles if secrets are configured in repo settings.
          # Leave unset to build without updater signatures.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apiprox-${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apiprox-${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apiprox-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error

  build-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux/archlinux:latest

    steps:
      - name: Install git (required for checkout in Arch container)
        run: pacman -Sy --noconfirm git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system and install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            nodejs \
            npm \
            rust \
            webkit2gtk-4.1 \
            gtk3 \
            libsoup3 \
            openssl \
            patchelf \
            dpkg \
            rpm-tools

      - name: Install root Node.js dependencies
        run: npm install

      - name: Install webview Node.js dependencies
        run: cd src-tauri/webview && npm install

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package for Arch Linux
        run: |
          useradd -m builder
          WORKDIR="$(pwd)"
          chown -R builder:builder "$WORKDIR"
          cat > /tmp/run-makepkg.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$WORKDIR"
          mkdir -p src-tauri/target/release/bundle/arch
          PKGDEST="$WORKDIR/src-tauri/target/release/bundle/arch" makepkg -f --nodeps --nocheck --noconfirm
          SCRIPT
          chmod +x /tmp/run-makepkg.sh
          su -s /bin/bash builder /tmp/run-makepkg.sh

      - name: Upload Arch Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apiprox-linux-arch
          path: src-tauri/target/release/bundle/arch/*.pkg.tar.zst
          if-no-files-found: error

  release:
    needs: [build, build-arch]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build.result == 'success' &&
      needs.build-arch.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.pkg.tar.zst
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
