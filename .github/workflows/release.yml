name: Release

# Manually triggered from the GitHub Actions UI.
# Reads the version from tauri.conf.json and creates a GitHub Release
# with DMG (macOS), NSIS installer (Windows), and Windows portable exe attached.
#
# Requirements:
#   - The most recent CI build on main must have passed (enforced below).
#   - TAURI_SIGNING_PRIVATE_KEY / _PASSWORD secrets must be set in repo settings.
#   - GITHUB_TOKEN is provided automatically by GitHub Actions.
on:
  workflow_dispatch:

jobs:
  # ── Gate: ensure the latest CI run on main passed ──────────────────────────
  check-ci:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Verify latest CI build on main passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(gh run list \
            --workflow build.yml \
            --branch main \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Latest CI conclusion: $STATUS"
          if [ "$STATUS" != "success" ]; then
            echo "❌ Latest CI build did not pass (status: $STATUS). Fix it before releasing."
            exit 1
          fi

  # ── Build matrix (macOS + Windows) ─────────────────────────────────────────
  build:
    needs: check-ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build @apinox/request-editor
        working-directory: vendor/APInox/packages/request-editor
        run: npm install && npm install --no-save @tauri-apps/api && npm run build

      - name: Install webview dependencies
        working-directory: src-tauri/webview
        run: npm install

      - name: Build webview
        working-directory: src-tauri/webview
        run: npm run build

      - name: Install root dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Rename the portable exe so it's clearly labelled in the release
      - name: Stage Windows portable exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "src-tauri/target/${{ matrix.target }}/release/APIprox.exe"
          $dst = "src-tauri/target/${{ matrix.target }}/release/APIprox-portable.exe"
          if (Test-Path $src) { Copy-Item $src $dst }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/APIprox-portable.exe
          if-no-files-found: ignore

  # ── Publish GitHub Release ──────────────────────────────────────────────────
  publish:
    needs: [check-ci, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog from commits since last tag
        id: changelog
        run: |
          VERSION="v${{ needs.check-ci.outputs.version }}"
          # Find the previous tag to diff against
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            # No previous tag — include all commits
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          echo "Changelog range: ${PREV_TAG:-<beginning>} → HEAD"

          # Collect commits: hash (short) + subject, skip merge commits and
          # CI-only noise (bump version, update lock, chore: release)
          COMMITS=$(git log "$RANGE" \
            --no-merges \
            --pretty=format:"- %s ([%h](../../commit/%H))" \
            | grep -Ev "^- (chore: bump version|chore: release|Merge branch|update Cargo\.lock)" \
            || true)

          if [ -z "$COMMITS" ]; then
            COMMITS="_No user-facing changes since ${PREV_TAG}._"
          fi

          # Write to a file so newlines survive the env-var boundary
          {
            echo "## What's changed"
            echo ""
            echo "$COMMITS"
            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "**Full diff**: [$PREV_TAG → $VERSION](../../compare/${PREV_TAG}...${VERSION})"
            fi
          } > changelog.md

          cat changelog.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-ci.outputs.version }}
          name: APIprox v${{ needs.check-ci.outputs.version }}
          draft: true
          body_path: changelog.md
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
